version: '3.9'

services:
  frontend:
    build: ./frontend_NEXT
    container_name: frontend_next
    ports:
      - "3000:3000"
    restart: always
    depends_on:
      - backend

  backend:
    build: ./backend
    container_name: backend_server
    ports:
      - "5000:5000"
    restart: always
    env_file:
      - ./backend/.env
    depends_on:
      - db

  db:
    image: postgres:17
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_DB: lang_platformdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d

volumes:
  pgdata:
